body:
  text: 凶禮室廟藏主室論尚書符問太常賀循太廟制度南向七室北向陰室復有七帝共處七室坎中當別處陰室循上曰謹按后配尊於帝神主所居同太室循又按漢儀藏王於室中西牆壁坎中去地六尺一寸當祠則設座於坎中禮天子達嚮者牖也謂夾戶之窗古者帝各異廟今者共堂別室制度不同疑室戶亦異又按古禮神王皆盛以石函餘薦藉太常華恆被符宗廟宜時有定處恆按前議以為七代制之正也若兄弟旁及禮之變也則宜為祖主立室不宜以室限神主今有七室而神主有十宜當別立臣為聖朝已從漢制今聖上繼武帝廟之昭穆四代而已前太常賀循並以為惠懷愍三帝別立寢廟臣以為廟當以容主為限亦無常數據殷祭六廟而有三祖三宗不毀又漢之二祖寢廟各異明功德之君自當特立若繫之七室則殷之末代當祭禰而已準之前議知以七正不限之七室故雖有兄弟旁及至禘祫不越昭穆則章郡潁川宜全七代之禮按周官有先公先王之廟今宜為京兆以上別立三室於太廟西廂宣皇帝得正始祖之位惠懷二帝不替而昭穆不闕於禮為安孔衍曰別廟有非正之嫌似若降替不可行也杜佑通典卷四十八乖離論聖人制禮以為經常之教宜備有其文以辨彰其義即今代父子乖離不知自處之宜情至者哀過於有凶情薄者習於無別此人倫大事禮所宜明謂莫測存亡則名不定名不定不可為制孝子憂危在心念至則然矣自然之情必有降殺故五服之章以周月為節況不聞凶何得過之雖終身不知存亡無緣更重於三年之喪也故聖人不別為其制也通典卷九十八禁招魂葬論時有染在寇賊失亡尸喪皆招魂而葬吾以為出於鄙陋之心委巷之禮非聖人之制而為愚淺所安遂行於時王者所宜禁也何則聖人制殯葬之意本以藏形而已不以安魂為事故既葬之日迎神而返不忍一日離也況乃招其魂而葬之反於人情而失其理虛造此事以亂聖典宜可禁也李瑋宜招魂葬論難衍引禮祖祭是送神也既葬三日又祭於墓中有靈座几筵飲燕之物非唯藏形也引周武尚祭于畢季子復命于墓成公夢康叔相奪余饗既葬迎神而返博求神之道孝子未忍離其親耳且宗廟是蒸嘗之常宇非為先靈常止此廟也猶圜丘是郊祀之處非為天神常居此丘也詩曰祖考來格知自外至也又曰神保聿歸歸其幽冥也卜宅安厝亦安神也伯姬父死而叔弓如宋葬恭姬皆其證也宋王先賢光武明主伏恭范逡並通義理公主亦招魂葬豈皆委巷乎孔衍答曰祭必立壇不可謂神必墓中也若神必墓中則成周雒邑之廟皆虛設也又帝丘及詩來格聿歸皆所以明魂無不從耳既葬三日祭墓亦猶飯唅不忍其虛耳恭姬之焚以明窮而彌正不必灰燼也就復灰燼骨肉雖灰灰則實何緣舍理灰之質而反當葬魂乎此皆末代失禮之舉非合聖人之舊也通典卷一百三
